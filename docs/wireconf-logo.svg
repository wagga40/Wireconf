<svg width="720" height="240" viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E5A8C"/>
      <stop offset="25%" stop-color="#3B8FD4"/>
      <stop offset="50%" stop-color="#4DA6E8"/>
      <stop offset="75%" stop-color="#3B8FD4"/>
      <stop offset="100%" stop-color="#1E5A8C"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A4F7A"/>
      <stop offset="20%" stop-color="#3080C0"/>
      <stop offset="50%" stop-color="#5BB0E8"/>
      <stop offset="80%" stop-color="#3080C0"/>
      <stop offset="100%" stop-color="#1A4F7A"/>
    </linearGradient>
    <linearGradient id="rimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BC0F0"/>
      <stop offset="100%" stop-color="#2878B0"/>
    </linearGradient>
    <linearGradient id="pipeInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2A44"/>
      <stop offset="100%" stop-color="#14405E"/>
    </linearGradient>
    <linearGradient id="shieldG" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#6DB3F2"/>
      <stop offset="100%" stop-color="#3B7DD8"/>
    </linearGradient>
    <linearGradient id="shieldS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8AC4FA"/>
      <stop offset="100%" stop-color="#2A6ABF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="240" rx="16" fill="#0E1525"/>

  <!-- === PIPES (behind text layer) === -->

  <!-- Pipe 1: far left, tall, coming from bottom -->
  <rect x="32" y="100" width="36" height="140" fill="url(#pipe)"/>
  <rect x="32" y="100" width="36" height="140" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <line x1="44" y1="104" x2="44" y2="240" stroke="#5BB8F0" stroke-width="1" opacity="0.25"/>
  <rect x="26" y="92" width="48" height="16" rx="3" fill="url(#rim)"/>
  <rect x="26" y="92" width="48" height="16" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="30" y="92" width="40" height="5" rx="2" fill="url(#rimTop)" opacity="0.5"/>
  <rect x="36" y="94" width="28" height="4" rx="2" fill="url(#pipeInner)"/>

  <!-- Pipe 2: left area, short, from bottom -->
  <rect x="95" y="168" width="28" height="72" fill="url(#pipe)"/>
  <rect x="95" y="168" width="28" height="72" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <line x1="105" y1="172" x2="105" y2="240" stroke="#5BB8F0" stroke-width="1" opacity="0.25"/>
  <rect x="90" y="160" width="38" height="14" rx="3" fill="url(#rim)"/>
  <rect x="90" y="160" width="38" height="14" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="94" y="160" width="30" height="4" rx="2" fill="url(#rimTop)" opacity="0.5"/>
  <rect x="99" y="162" width="20" height="3" rx="1.5" fill="url(#pipeInner)"/>

  <!-- Pipe 3: left-center, hanging from top -->
  <rect x="140" y="0" width="30" height="68" fill="url(#pipe)"/>
  <rect x="140" y="0" width="30" height="68" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <line x1="150" y1="0" x2="150" y2="64" stroke="#5BB8F0" stroke-width="1" opacity="0.25"/>
  <rect x="135" y="62" width="40" height="14" rx="3" fill="url(#rim)"/>
  <rect x="135" y="62" width="40" height="14" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="139" y="72" width="32" height="4" rx="2" fill="url(#rimTop)" opacity="0.5"/>
  <rect x="144" y="64" width="22" height="3" rx="1.5" fill="url(#pipeInner)"/>

  <!-- Pipe 4: right of center, from top, medium -->
  <rect x="530" y="0" width="26" height="52" fill="url(#pipe)"/>
  <rect x="530" y="0" width="26" height="52" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <line x1="539" y1="0" x2="539" y2="48" stroke="#5BB8F0" stroke-width="1" opacity="0.25"/>
  <rect x="525" y="46" width="36" height="13" rx="3" fill="url(#rim)"/>
  <rect x="525" y="46" width="36" height="13" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="529" y="55" width="28" height="4" rx="2" fill="url(#rimTop)" opacity="0.5"/>
  <rect x="533" y="48" width="20" height="3" rx="1.5" fill="url(#pipeInner)"/>

  <!-- Pipe 5: right area, tall from bottom -->
  <rect x="600" y="110" width="34" height="130" fill="url(#pipe)"/>
  <rect x="600" y="110" width="34" height="130" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <line x1="611" y1="114" x2="611" y2="240" stroke="#5BB8F0" stroke-width="1" opacity="0.25"/>
  <rect x="594" y="102" width="46" height="16" rx="3" fill="url(#rim)"/>
  <rect x="594" y="102" width="46" height="16" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="598" y="102" width="38" height="5" rx="2" fill="url(#rimTop)" opacity="0.5"/>
  <rect x="604" y="104" width="26" height="4" rx="2" fill="url(#pipeInner)"/>

  <!-- Pipe 6: far right, short from bottom -->
  <rect x="668" y="155" width="30" height="85" fill="url(#pipe)"/>
  <rect x="668" y="155" width="30" height="85" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <line x1="678" y1="159" x2="678" y2="240" stroke="#5BB8F0" stroke-width="1" opacity="0.25"/>
  <rect x="663" y="148" width="40" height="14" rx="3" fill="url(#rim)"/>
  <rect x="663" y="148" width="40" height="14" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="667" y="148" width="32" height="4" rx="2" fill="url(#rimTop)" opacity="0.5"/>
  <rect x="672" y="150" width="22" height="3" rx="1.5" fill="url(#pipeInner)"/>

  <!-- Pipe 7: small one from top, far right -->
  <rect x="650" y="0" width="22" height="36" fill="url(#pipe)"/>
  <rect x="650" y="0" width="22" height="36" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="646" y="30" width="30" height="12" rx="3" fill="url(#rim)"/>
  <rect x="646" y="30" width="30" height="12" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="654" y="32" width="14" height="3" rx="1.5" fill="url(#pipeInner)"/>

  <!-- Pipe 8: small from bottom, left-center -->
  <rect x="188" y="198" width="24" height="42" fill="url(#pipe)"/>
  <rect x="188" y="198" width="24" height="42" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="184" y="191" width="32" height="13" rx="3" fill="url(#rim)"/>
  <rect x="184" y="191" width="32" height="13" rx="3" fill="none" stroke="#164A72" stroke-width="0.8"/>
  <rect x="192" y="193" width="16" height="3" rx="1.5" fill="url(#pipeInner)"/>

  <!-- === TEXT LAYER === -->

  <!-- "Wire" -->
  <text x="324" y="132" text-anchor="end" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace" font-weight="600" font-size="52" fill="#E8ECF2" letter-spacing="2">Wire</text>

  <!-- Shield "o" -->
  <g filter="url(#glow)">
    <path d="M338,82 L360,74 L382,82 L382,134 Q360,152 338,134 Z" fill="url(#shieldG)" opacity="0.25"/>
  </g>
  <path d="M338,82 L360,74 L382,82 L382,134 Q360,152 338,134 Z" fill="url(#shieldG)"/>
  <path d="M338,82 L360,74 L382,82 L382,134 Q360,152 338,134 Z" fill="none" stroke="url(#shieldS)" stroke-width="1.2"/>
  <path d="M343,87 L360,80 L377,87 L377,131 Q360,146 343,131 Z" fill="none" stroke="#FFFFFF" stroke-width="0.4" opacity="0.2"/>
  <path d="M352,108 L358,116 L374,96" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "conf" -->
  <text x="390" y="132" text-anchor="start" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace" font-weight="600" font-size="52" fill="#E8ECF2" letter-spacing="2">conf</text>

  <!-- Tagline -->
  <text x="360" y="172" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace" font-weight="400" font-size="11" fill="#5A7090" letter-spacing="5">WIREGUARD · SIMPLIFIED</text>
</svg>